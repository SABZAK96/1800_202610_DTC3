<body>
  
<site-navbar></site-navbar>
    
<main class="max-w-7xl mx-auto relative pt-7 px-10 ml-0 md:ml-50 md:mt-4 md:mr-4 md:mb-4 mx-auto bg-[var(--light-grey)] shadow-2xl rounded-0 md:rounded-[30px]">
<div class="absolute top-0 w-full h-75 rounded-t-2xl -ml-10 bg-[#d8d4da] z-0"></div>
<div class="mx-auto z-10 relative">

    <!--Header Search and login-->
    <div class=" flex flex-wrap flex-row  gap-3 justify-between items-align mb-20">
        <!--Left side-->
        <div>
        <form class="">
            <input type="text" placeholder="Search" class="h-10 w-40 bg-white px-4 rounded-full text-sm">
            <button class="bg-[var(--medium-grey)] h-10 md:px-4 px-2  rounded-full text-white text-sm">Search</button>
        </form>
        </div>
        <!--Right side-->
        <div id="" class="signedinuser flex gap-5">
            <!--Friend Requests-->
            <div class="hidden lg:flex lg:justify-center lg:items-center">
                <button class="bg-[var(--primary-green)] h-10 px-4 rounded-full text-white text-sm font-bold mr-3">3</button>
                <p class="text-xs font-bold">Friend requests</p>
            </div>
            <!--Profile image-->
            <div class="flex justify-center  gap-2 items-center">

                <img id="profile-img" src="images/profile-image-sample.jpg" class="bg-[var(--primary-green)] h-10 border-2 border-white rounded-full text-white text-sm mr-3 cursor-pointer"></img>
                <p id="username-display" class=" text-sm font-bold pr-10 md:pr-0"></p>

            </div>
            <button id="auth-btn" class="bg-black h-10 px-4 rounded-full text-white text-sm">Log out</button>
        </div>
    </div>

    <div id="userCalendar">
    

    </div>
    
  <footer class="flex flex-col sm:flex-row justify-between border-t-1 border-gray-400 pt-10 pb-50 md:pb-10">
    <div><p style="font-weight: bold;">Copyright FIFA 2026</p></div>
    <div class="flex gap-5">
      <p>Help</p>
      <p>Contact</p>
    </div>
  </footer>

<!--Inner div ends-->

</main>
