<!DOCTYPE html>
<html lang="en">

<head>
    <title>My BCIT Project</title>
    <meta name="comp1800 template" content="My 1800 App">
  
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./styles/style.css">
    <script type="module" src="./src/site-navbar.js"></script>
    <script type="module" src="./src/site-footer.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>

    <!-- Other libraries go here -->

  </head>
  
  <body class="bg-[var(--medium-grey)] flex flex-col md:flex-row min-h-screen">
   
    

    
 
<site-navbar></site-navbar>
<main class="w-full pt-5 px-6 md:px-10 md:ml-64 mx-auto bg-[var(--light-grey)] min-h-screen rounded-none md:rounded-tl-[40px] md:rounded-bl-[40px]">
  
  
        <div class="container mt-5 py-5" style="max-width: 420px;">
        <!-- Alerts -->
        <div id="authAlert" class="alert alert-danger d-none" role="alert"></div>

        <!-- Login -->
        <div id="loginView">
            <h3 class="mb-3 text-center">Login</h3>
            <form id="loginForm" novalidate>
                <div class="mb-3">
                    <input type="email" id="loginEmail" class="form-control" placeholder="Email" required />
                </div>
                <div class="mb-3">
                    <input type="password" id="loginPassword" class="form-control" placeholder="Password" required />
                </div>
                <button type="submit"  class="btn btn-success w-100">Login</button>
            </form>
            <small class="d-block mt-3 text-center">
                Don’t have an account?
                <a href="#" id="toSignup">Sign up</a>
            </small>
        </div>

        <!-- Signup -->
        <div id="signupView" class="d-none">
            <h3 class="mb-3 text-center">Sign Up</h3>
            <form id="signupForm" novalidate>
                <div class="mb-3">
                    <input type="text" id="signupName" class="form-control" placeholder="First and Last Name"
                        aria-label="Full name" required />
                </div>
                <div class="mb-3">
                    <input type="email" id="signupEmail" class="form-control" placeholder="Email" required />
                </div>
                <div class="mb-3">
                    <input type="password" id="signupPassword" class="form-control" placeholder="Password" required />
                </div>
                <button type="submit"  class="btn btn-success w-100">Create Account</button>
            </form>
            <small class="d-block mt-3 text-center">
                Already have an account?
                <a href="#" >Login</a>
            </small>
        </div>
    </div>
</main>
<site-footer></site-footer>

    <script type="module" src="/src/loginSignup.js"></script>
   

</body>

</html>
